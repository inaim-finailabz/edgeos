[build]
  publish = "site"
  functions = "site/netlify/functions"

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/demo/data"
  to = "/.netlify/functions/demo-data"
  status = 200

[[redirects]]
  from = "/.well-known/did.json"
  to = "/.netlify/functions/bluesky-did"
  status = 200

[[redirects]]
  from = "/xrpc/app.bsky.feed.describeFeedGenerator"
  to = "/.netlify/functions/bluesky-describe-feed"
  status = 200

[[redirects]]
  from = "/xrpc/app.bsky.feed.getFeedSkeleton"
  to = "/.netlify/functions/bluesky-feed-skeleton"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
