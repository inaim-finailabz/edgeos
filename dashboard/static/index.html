<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EdgeOS Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>EdgeOS</h1>
  <div class="token-box">
    <label for="token">Management token</label>
    <input id="token" type="password" placeholder="required for add / remove / stop / reload" autocomplete="off">
  </div>
</header>

<main>
  <div id="status" class="status" hidden></div>

  <section id="kpis" class="kpis" aria-label="Fleet summary">
    <div class="kpi"><span class="kpi-label">Nodes</span><span class="kpi-value" id="kpi-nodes">–</span></div>
    <div class="kpi"><span class="kpi-label">Healthy</span><span class="kpi-value" id="kpi-healthy">–</span></div>
    <div class="kpi"><span class="kpi-label">Active requests</span><span class="kpi-value" id="kpi-active">–</span></div>
    <div class="kpi"><span class="kpi-label">Fleet tok/s</span><span class="kpi-value" id="kpi-tokpersec">–</span></div>
    <div class="kpi"><span class="kpi-label">Models loaded</span><span class="kpi-value" id="kpi-models">–</span></div>
    <div class="kpi"><span class="kpi-label">Served (local / cloud)</span><span class="kpi-value" id="kpi-served">–</span></div>
    <div class="kpi"><span class="kpi-label">Failed</span><span class="kpi-value" id="kpi-failed">–</span></div>
  </section>

  <details class="add-node">
    <summary>Add node by IP / DNS</summary>
    <form id="add-node-form">
      <label>Host <input id="add-host" type="text" placeholder="192.168.1.50 or pi5.local" required></label>
      <label>Port <input id="add-port" type="number" placeholder="8090" min="1" max="65535"></label>
      <button type="submit">Add</button>
      <span class="hint">For nodes mDNS can't reach (different subnet, etc). Requires the management token above.</span>
    </form>
  </details>

  <table id="nodes">
    <thead>
      <tr>
        <th>Node</th>
        <th>Host</th>
        <th>Platform</th>
        <th>Accel</th>
        <th>Model</th>
        <th>State</th>
        <th>Tok/s</th>
        <th>Active</th>
        <th>Healthy</th>
        <th>Last seen</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="nodes-body">
      <tr><td colspan="11" class="empty">Loading…</td></tr>
    </tbody>
  </table>
</main>

<script src="app.js"></script>
</body>
</html>
